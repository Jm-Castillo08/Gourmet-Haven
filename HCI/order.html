<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gourmet Haven | Place Your Order</title>
    <link rel="stylesheet" href="Landingpage.css">
    <style>
        /* Additional styles for order page */
        .order-page-header {
            background: linear-gradient(135deg, #1a160e, #0f0e0a);
            padding: 100px 20px 40px;
            text-align: center;
        }
        
        .order-page-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFF8E7, #F5D98F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        
        .back-home {
            display: inline-block;
            margin-top: 20px;
            color: #f5bc5c;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-home:hover {
            color: #ffde8a;
        }
        
        .order-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5% 80px;
        }
        
        .menu-cards-order {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .food-card-order {
            background: rgba(20, 18, 14, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px;
            width: 280px;
            text-align: center;
            transition: all 0.25s;
            border: 1px solid rgba(230, 180, 70, 0.4);
        }
        
        .food-card-order:hover {
            transform: translateY(-6px);
            border-color: #e6b13e;
        }
        
        .food-img-order {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 15px;
        }
        
        .order-panel-full {
            background: rgba(30, 27, 20, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 30px;
            margin-top: 40px;
        }
        
        .cart-items-full {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .cart-item-full {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2f2a1f;
            margin: 8px 0;
            padding: 10px 16px;
            border-radius: 50px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .remove-item {
            background: #8b3a2a;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .remove-item:hover {
            background: #b54530;
        }
        
        .checkout-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid #5f4e2e;
        }
        
        .grand-total {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f7cd75;
        }
        
        .buy-now-btn {
            background: #f5bc5c;
            border: none;
            padding: 14px 40px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .buy-now-btn:hover {
            background: #ffd580;
            transform: scale(1.02);
        }
        
        .history-box {
            margin-top: 40px;
            background: rgba(21, 18, 13, 0.6);
            border-radius: 28px;
            padding: 24px;
        }
        
        .history-box h3 {
            color: #f5cd6d;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<nav class="nav-chan">
    <div class="logo">🍽️ Gourmet Haven</div>
    <div class="burger" onclick="toggleMenuOrder()">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div class="nav-links" id="navLinksOrder">
        <a href="Landingpage.html">🏠 Back to Home</a>
        <a href="Landingpage.html#menuSection">📖 View Menu</a>
        <a href="Landingpage.html#aboutSection">✨ About</a>
    </div>
</nav>

<div class="order-page-header">
    <h1>📋 Place Your Catering Order</h1>
    <p>Select items, adjust quantities, and confirm your purchase</p>
    <a href="Landingpage.html" class="back-home">← Back to Main Page</a>
</div>

<div class="order-container">
    <!-- Menu Items with Order Controls -->
    <div class="menu-cards-order" id="menuOrderContainer"></div>
    
    <!-- Order Panel -->
    <div class="order-panel-full">
        <h3 style="margin-bottom: 20px;">🛒 Your Order Cart</h3>
        <div class="cart-items-full" id="cartItemsFull">
            <em>Your cart is empty</em>
        </div>
        
        <div class="checkout-area">
            <div>
                <div>Total Amount</div>
                <div class="grand-total" id="grandTotalDisplay">₱0</div>
            </div>
            <button class="buy-now-btn" id="confirmPurchaseBtn">✅ CONFIRM PURCHASE</button>
        </div>
    </div>
    
    <!-- Purchase History -->
    <div class="history-box">
        <h3>📜 Purchase History</h3>
        <div id="purchaseHistoryFull" style="max-height: 200px; overflow-y: auto; margin-top: 15px;">
            <div style="color: #9e9074;">No orders yet.</div>
        </div>
    </div>
</div>

<script>
    // Food data (matching Java logic)
    const food_names_order = ["Chicken Adobo Platter", "Lechon Kawali", "Fried Rice Bilao", "Mixed Vegetables", "Fruit Salad Bowl"];
    const food_prices_order = [2500, 3000, 1200, 800, 1000];
    
    // Fixed dish images for order page (same as main page)
    const dishImagesOrder = [
        "https://recipetineats.com/wp-content/uploads/2015/02/Filipino-Chicken-Adobo_6.jpg",
        "https://almostnordic.com/wp-content/uploads/2022/09/lechon-kawali-recipe.jpg",
        "https://cdn.shopify.com/s/files/1/0557/5390/0228/products/inasal-rice_1024x1024.png?v=1659108234",
        "https://kalabashcuisine.com/wp-content/uploads/2022/10/mixed-vegetables.jpg",
        "https://www.shelovesbiscotti.com/wp-content/uploads/2020/06/Healthy-Fruit-Salad-Recipe-5.jpg"
    ];
    
    // Cart state
    let cartOrder = [];
    let purchaseHistoryOrder = [];
    
    // Render menu with quantity selectors
    function renderOrderMenu() {
        const container = document.getElementById('menuOrderContainer');
        if (!container) return;
        
        let html = '';
        for (let i = 0; i < food_names_order.length; i++) {
            const uniqueId = `order_qty_${i}`;
            html += `
                <div class="food-card-order">
                    <img class="food-img-order" src="${dishImagesOrder[i]}" alt="${food_names_order[i]}" onerror="this.src='https://placehold.co/300x180?text=🍽️'">
                    <h3>${food_names_order[i]}</h3>
                    <div class="price">₱${food_prices_order[i].toLocaleString()}</div>
                    <div class="qty-control" style="margin: 15px 0;">
                        <button onclick="changeOrderQty(-1, '${uniqueId}')">−</button>
                        <span class="qty-num" id="${uniqueId}">1</span>
                        <button onclick="changeOrderQty(1, '${uniqueId}')">+</button>
                    </div>
                    <button class="add-to-cart" onclick="addToOrderCart(${i}, '${uniqueId}')">🛒 Add to Cart</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function changeOrderQty(step, elementId) {
        const span = document.getElementById(elementId);
        let val = parseInt(span.innerText);
        let newVal = val + step;
        if (newVal < 1) newVal = 1;
        span.innerText = newVal;
    }
    
    function addToOrderCart(foodIndex, quantityElemId) {
        const qtyElem = document.getElementById(quantityElemId);
        let qty = parseInt(qtyElem.innerText);
        if (isNaN(qty) || qty <= 0) qty = 1;
        
        const existing = cartOrder.find(i => i.index === foodIndex);
        if (existing) {
            existing.quantity += qty;
        } else {
            cartOrder.push({ index: foodIndex, quantity: qty });
        }
        updateCartUIOrder();
        qtyElem.innerText = "1";
    }
    
    function updateCartUIOrder() {
        const cartContainer = document.getElementById('cartItemsFull');
        const totalSpan = document.getElementById('grandTotalDisplay');
        let total = 0;
        
        if (cartOrder.length === 0) {
            cartContainer.innerHTML = '<em>Your cart is empty</em>';
            totalSpan.innerText = '₱0';
            return;
        }
        
        let html = '';
        for (let i = 0; i < cartOrder.length; i++) {
            const item = cartOrder[i];
            const name = food_names_order[item.index];
            const price = food_prices_order[item.index];
            const subtotal = price * item.quantity;
            total += subtotal;
            html += `
                <div class="cart-item-full">
                    <span>🍽️ ${item.quantity}x ${name}</span>
                    <span>₱${subtotal.toLocaleString()}</span>
                    <button class="remove-item" onclick="removeFromOrderCart(${i})">Remove</button>
                </div>
            `;
        }
        cartContainer.innerHTML = html;
        totalSpan.innerText = `₱${total.toLocaleString()}`;
    }
    
    function removeFromOrderCart(index) {
        cartOrder.splice(index, 1);
        updateCartUIOrder();
    }
    
    function confirmPurchaseOrder() {
        if (cartOrder.length === 0) {
            alert("No items in cart. Please add items before buying.");
            return;
        }
        
        let orderTotal = 0;
        let orderDetailsLines = [];
        for (let item of cartOrder) {
            const itemPrice = food_prices_order[item.index];
            const cost = itemPrice * item.quantity;
            orderTotal += cost;
            orderDetailsLines.push(`${item.quantity}x ${food_names_order[item.index]} - ₱${cost.toLocaleString()}`);
        }
        
        const userConfirmed = confirm(`Your current order total: ₱${orderTotal.toLocaleString()}\n\nDo you want to BUY this order?`);
        if (userConfirmed) {
            const historyEntry = `Order total: ₱${orderTotal.toLocaleString()}\n${orderDetailsLines.join('\n')}`;
            purchaseHistoryOrder.unshift(historyEntry);
            updateHistoryUIOrder();
            alert("✅ Thank you for your purchase! Order saved to history.");
            cartOrder = [];
            updateCartUIOrder();
        } else {
            alert("Order cancelled. No items were bought.");
        }
    }
    
    function updateHistoryUIOrder() {
        const historyDiv = document.getElementById('purchaseHistoryFull');
        if (!historyDiv) return;
        if (purchaseHistoryOrder.length === 0) {
            historyDiv.innerHTML = '<div style="color:#9e9074;">No orders yet.</div>';
            return;
        }
        let html = '';
        for (let i = 0; i < purchaseHistoryOrder.length; i++) {
            html += `<div style="background:#2c261c; margin:10px 0; padding:12px; border-radius:20px;">
                        <strong>Order #${i+1}</strong><br>
                        <pre style="margin-top:6px; white-space:pre-wrap; font-family:monospace;">${purchaseHistoryOrder[i]}</pre>
                     </div>`;
        }
        historyDiv.innerHTML = html;
    }
    
    // Mobile menu for order page
    function toggleMenuOrder() {
        const navLinks = document.getElementById('navLinksOrder');
        navLinks.classList.toggle('active');
        const lines = document.querySelectorAll('.burger div');
        if (navLinks.classList.contains('active')) {
            if (lines.length === 3) {
                lines[0].style.transform = 'rotate(45deg) translate(5px, 6px)';
                lines[1].style.opacity = '0';
                lines[2].style.transform = 'rotate(-45deg) translate(5px, -6px)';
            }
        } else {
            lines.forEach(l => { l.style.transform = ''; l.style.opacity = '1'; });
        }
    }
    
    // Make functions global
    window.changeOrderQty = changeOrderQty;
    window.addToOrderCart = addToOrderCart;
    window.removeFromOrderCart = removeFromOrderCart;
    window.toggleMenuOrder = toggleMenuOrder;
    
    // Initialize
    renderOrderMenu();
    updateCartUIOrder();
    updateHistoryUIOrder();
    document.getElementById('confirmPurchaseBtn').addEventListener('click', confirmPurchaseOrder);
    
</script>
</body>
</html>
